name: Bump version and release
on:
  push:
    branches:
      - main

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    if: ${{ !github.event.act }} # skip during local actions testing
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: extractions/setup-just@v4

      - name: Create release token
        id: release-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            hotaisle-cli
            homebrew-tap
            apt-repo
            rpm-repo
          permission-contents: write

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.release-token.outputs.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go install binaries
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-bin-${{ hashFiles('justfile', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-bin-

      - name: Create tag and GitHub release
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ steps.release-token.outputs.token }}
        run: |
          npx --yes \
            --package semantic-release@25 \
            --package @semantic-release/exec@7 \
            semantic-release

      - name: Checkout Homebrew tap
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: hotaisle/homebrew-tap
          path: homebrew-tap
          token: ${{ steps.release-token.outputs.token }}

      - name: Generate Homebrew formula
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        run: |
          VERSION="${{ steps.semantic-release.outputs.new_tag }}" just brew-formula > homebrew-tap/Formula/hotaisle.rb

      - name: Push formula to Homebrew tap
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        run: |
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/hotaisle.rb
          git commit -m "Update formula for ${{ steps.semantic-release.outputs.new_tag }}"
          git push origin main

      - name: Checkout APT repository
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: hotaisle/apt-repo
          path: apt-repo
          token: ${{ steps.release-token.outputs.token }}

      - name: Copy packages to APT repository directory
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        run: |
          mkdir -p dist-deb
          cp dist-pkg/*.deb dist-deb

      - name: Create APT repository
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        id: create-apt-repo
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: apt-repo
          signing-key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          signing-key-passphrase: ${{ secrets.APT_GPG_PASSPHRASE }}
          scan-dir: dist-deb
          limit: 10
          codename: stable
          components: main
          architectures: amd64 arm64 armhf
          import-from-repo-failure-allow: true
          import-from-repo-url: |
            deb-amd64 https://hotaisle.github.io/apt-repo stable main
            deb-arm64 https://hotaisle.github.io/apt-repo stable main
            deb-armhf https://hotaisle.github.io/apt-repo stable main

      - name: Push to APT repository
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        run: |
          ls -lah ${{ steps.create-apt-repo.outputs.dir }} 
          cp -r ${{ steps.create-apt-repo.outputs.dir }}/. apt-repo/
          
          cd apt-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Add packages from ${{ steps.semantic-release.outputs.new_tag }}" || echo "No changes to commit"
          git push origin main

      - name: Checkout RPM repository
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: hotaisle/rpm-repo
          path: rpm-repo
          token: ${{ steps.release-token.outputs.token }}

      - name: Create RPM repository
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
          APT_GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
        run: |
          sudo apt-get update
          sudo apt-get install -y createrepo-c

          mkdir -p rpm-repo/packages
          cp dist-pkg/*.rpm rpm-repo/packages/

          createrepo_c --update rpm-repo

          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --batch --yes --pinentry-mode loopback \
            --passphrase "$APT_GPG_PASSPHRASE" \
            --local-user "$APT_GPG_KEY_ID" \
            --detach-sign --armor rpm-repo/repodata/repomd.xml

      - name: Push to RPM repository
        if: ${{ steps.semantic-release.outputs.released == 'true' }}
        run: |
          cd rpm-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Add packages from ${{ steps.semantic-release.outputs.new_tag }}" || echo "No changes to commit"
          git push origin main
