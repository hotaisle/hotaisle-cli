name: Bump version and release
on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build:
    if: ${{ github.event.pull_request.merged == true && !github.event.act }} # skip during local actions testing
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: extractions/setup-just@v3

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag_version.outputs.new_tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go install binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-bin-${{ hashFiles('justfile', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-bin-

      - name: Build distribution
        run: just release

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          artifacts: "dist/*.zip, dist/*.tar.gz, dist-pkg/*"
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: hotaisle/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ steps.tag_version.outputs.new_tag }}" just brew-formula > homebrew-tap/Formula/hotaisle.rb

      - name: Push formula to Homebrew tap
        run: |
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/hotaisle.rb
          git commit -m "Update formula for ${{ steps.tag_version.outputs.new_tag }}"
          git push origin main

      - name: Checkout APT repository
        uses: actions/checkout@v5
        with:
          repository: hotaisle/apt-repo
          path: apt-repo
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Copy packages to APT repository directory
        run: |
          mkdir -p apt-repo/packages
          cp dist-pkg/*.deb apt-repo/packages/

      - name: Generate APT repository
        uses: morph027/apt-repo-action@v3
        with:
          repo-name: hotaisle
          signing-key: ${{ secrets.APT_GPG_KEY_ID }}
          signing-key-passphrase: ${{ secrets.APT_GPG_PASSPHRASE }}
          scan-dir: apt-repo/packages
          limit: 10
          codename: stable
          components: main
          architectures: amd64 arm64 armhf
          import-from-repo-failure-allow: true
          import-from-repo-url: |
            deb-amd64 https://hotaisle.github.io/apt-repo stable main
            deb-arm64 https://hotaisle.github.io/apt-repo stable main
            deb-armhf https://hotaisle.github.io/apt-repo stable main

      - name: Push to APT repository
        run: |
          cp -r ${{ steps.create-apt-repo.outputs.dir }} apt-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Add packages from ${{ steps.tag_version.outputs.new_tag }}" || echo "No changes to commit"
          git push origin main
