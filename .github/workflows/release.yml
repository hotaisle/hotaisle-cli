name: Bump version and release
on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build:
    if: ${{ github.event.pull_request.merged == true && !github.event.act }} # skip during local actions testing
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: extractions/setup-just@v3

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag_version.outputs.new_tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go install binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-bin-${{ hashFiles('justfile', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-bin-

      - name: Build distribution
        run: just release

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          artifacts: "dist/*.zip, dist/*.tar.gz, dist-pkg/*"
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: hotaisle/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ steps.tag_version.outputs.new_tag }}" just brew-formula > homebrew-tap/Formula/hotaisle.rb

      - name: Push formula to Homebrew tap
        run: |
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/hotaisle.rb
          git commit -m "Update formula for ${{ steps.tag_version.outputs.new_tag }}"
          git push origin main

      - name: Checkout APT repository
        uses: actions/checkout@v5
        with:
          repository: hotaisle/apt-repo
          path: apt-repo
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Import GPG key
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --import --batch --yes

      - name: Add packages to APT repository
        run: |
          cd apt-repo

          # Copy new deb packages
          cp ../dist-pkg/*.deb pool/main/

          # Generate Packages file for each architecture
          for arch in amd64 arm64 armhf; do
            mkdir -p dists/stable/main/binary-$arch
            dpkg-scanpackages --arch $arch pool/ > dists/stable/main/binary-$arch/Packages
            gzip -k -f dists/stable/main/binary-$arch/Packages
          done

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: Hotaisle
          Label: Hotaisle
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64 armhf
          Components: main
          Description: Hotaisle APT Repository
          Date: $(date -Ru)
          EOF

          # Add checksums to Release file
          echo "MD5Sum:" >> Release
          find main -type f -exec md5sum {} \; | sed 's|main/| |' >> Release
          echo "SHA256:" >> Release
          find main -type f -exec sha256sum {} \; | sed 's|main/| |' >> Release

          # Sign the Release file
          gpg --default-key "${{ secrets.APT_GPG_KEY_ID }}" -abs -o Release.gpg Release
          gpg --default-key "${{ secrets.APT_GPG_KEY_ID }}" -abs --clearsign -o InRelease Release

      - name: Push to APT repository
        run: |
          cd apt-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Add packages from ${{ steps.tag_version.outputs.new_tag }}" || echo "No changes to commit"
          git push origin main
