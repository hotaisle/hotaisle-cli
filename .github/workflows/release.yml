name: Bump version and release
on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  build:
    if: ${{ github.event.pull_request.merged == true && !github.event.act }} # skip during local actions testing
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: extractions/setup-just@v3

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag_version.outputs.new_tag }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Cache Go install binaries
        uses: actions/cache@v4
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-bin-${{ hashFiles('justfile', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-bin-

      - name: Build distribution
        run: just release

      - name: Create a GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          makeLatest: true
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          artifacts: "dist/*.zip, dist/*.tar.gz, dist-pkg/*"
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Checkout Homebrew tap
        uses: actions/checkout@v5
        with:
          repository: hotaisle/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Generate Homebrew formula
        run: |
          VERSION="${{ steps.tag_version.outputs.new_tag }}" just brew-formula > homebrew-tap/Formula/hotaisle.rb

      - name: Push formula to Homebrew tap
        run: |
          cd homebrew-tap

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/hotaisle.rb
          git commit -m "Update formula for ${{ steps.tag_version.outputs.new_tag }}"
          git push origin main

      - name: Checkout APT repository
        uses: actions/checkout@v5
        with:
          repository: hotaisle/apt-repo
          path: apt-repo
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.APT_GPG_PASSPHRASE }}

      - name: Add packages to APT repository
        run: |
          set -xe
          
          cd apt-repo

          # Organize packages by architecture
          mkdir -p pool/main/{amd64,arm64,armhf}

          # Copy packages to architecture-specific directories
          cp ../dist-pkg/*-amd64.deb pool/main/amd64/
          cp ../dist-pkg/*-arm64.deb pool/main/arm64/
          cp ../dist-pkg/*-armhf.deb pool/main/armhf/

          # Generate Packages files for each architecture
          mkdir -p dists/stable/main/binary-{amd64,arm64,armhf}

          # Scan packages by architecture
          # dpkg-scanpackages expects to be run from repo root and outputs "pool/..." paths
          dpkg-scanpackages --arch amd64 pool/main/amd64 /dev/null > dists/stable/main/binary-amd64/Packages
          dpkg-scanpackages --arch arm64 pool/main/arm64 /dev/null > dists/stable/main/binary-arm64/Packages
          dpkg-scanpackages --arch armhf pool/main/armhf /dev/null > dists/stable/main/binary-armhf/Packages

          # Compress Packages files
          gzip -k -f dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-armhf/Packages

          # Generate Release file
          cd dists/stable
          cat > Release <<EOF
          Origin: Hotaisle
          Label: Hotaisle
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64 armhf
          Components: main
          Description: Hotaisle APT Repository
          Date: $(date -Ru)
          EOF

          # Add checksums to Release file (paths must be relative to dists/stable/)
          echo "MD5Sum:" >> Release
          find main -type f | while read file; do
            echo " $(md5sum "$file" | cut -d' ' -f1) $(stat -c%s "$file") $file"
          done >> Release

          echo "SHA1:" >> Release
          find main -type f | while read file; do
            echo " $(sha1sum "$file" | cut -d' ' -f1) $(stat -c%s "$file") $file"
          done >> Release

          echo "SHA256:" >> Release
          find main -type f | while read file; do
            echo " $(sha256sum "$file" | cut -d' ' -f1) $(stat -c%s "$file") $file"
          done >> Release

          # Sign the Release file with GPG
          gpg --batch --yes --armor --detach-sign -o Release.gpg Release
          gpg --batch --yes --armor --clearsign -o InRelease Release

      - name: Push to APT repository
        run: |
          cd apt-repo

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .
          git commit -m "Add packages from ${{ steps.tag_version.outputs.new_tag }}" || echo "No changes to commit"
          git push origin main
